models:
  - name: customers
    description: Customer overview data mart, offering key details for each unique customer. One row per customer.
    semantic_model:
      enabled: true
      name: customer
    agg_time_dimension: first_order_date
    data_tests:
      - dbt_utils.expression_is_true:
          arguments:
            expression: "lifetime_spend_pretax + lifetime_tax_paid = lifetime_spend"
    columns:
      - name: customer_id
        description: The unique key of the customers mart.
        data_tests:
          - not_null
          - unique
        entity:
          type: primary
          name: customer

      - name: customer_name
        description: Customers' full name.
        dimension:
          type: categorical

      - name: count_lifetime_orders
        description: Total number of orders a customer has ever placed.

      - name: first_order_date
        description: The date when a customer placed their first order.
        granularity: day
        dimension:
          type: time
          name: first_order_date

      - name: last_order_date
        description: The date of a customer's most recent order.
        granularity: day
        dimension:
          type: time
          name: last_order_date

      - name: lifetime_spend_pretax
        description: The sum of all the pre-tax subtotals of every order a customer has placed.

      - name: lifetime_tax_paid
        description: The sum of all the tax portion of every order a customer has placed.

      - name: lifetime_spend
        description: The sum of all the order totals including tax that a customer has ever placed.

      - name: customer_type
        description: Options are 'new' or 'returning', indicating if a customer has ordered more than once or has only placed their first order to date.
        data_tests:
          - accepted_values:
              arguments:
                values: ["new", "returning"]
        dimension:
          type: categorical

    metrics:
      - name: customer_count
        description: Count of customers.
        label: Customer Count
        type: simple
        agg: count
        expr: 1

      - name: returning_customer_count
        description: Count of returning customers.
        label: Returning Customer Count
        type: simple
        agg: count
        expr: 1
        filter: |
          {{ Dimension('customer__customer_type') }} = 'returning'

      - name: customer_lifetime_spend
        description: Sum of lifetime spend across customers.
        label: Customer Lifetime Spend
        type: simple
        agg: sum
        expr: lifetime_spend

      - name: customer_lifetime_tax_paid
        description: Sum of lifetime tax paid across customers.
        label: Customer Lifetime Tax Paid
        type: simple
        agg: sum
        expr: lifetime_tax_paid
