models:
  - name: products_ltv
    description: >
      Product lifetime value mart with one row per product. This model summarizes
      all historical order items to show each product's lifetime gross revenue,
      lifetime gross profit, and total supply cost, making it the primary mart
      for analyzing product-level LTV and long-run product profitability.
    columns:
      - name: product_id
        description: The unique key for the product.

      - name: gross_revenue
        description: The total lifetime revenue generated by the product across all order items.

      - name: gross_profit
        description: The product's lifetime gross profit, calculated as gross revenue minus total supply cost.

      - name: supply_cost_total
        description: The total lifetime supply cost allocated to the product across all order items.
